<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Course Offering | Student Management System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>

<!-- Include Navbar -->
<!-- ../../components/navbar.html -->

<!-- Include Sidebar -->
<!-- ../../components/sidebar.html -->

<div class="container-fluid py-4">

    <!-- ========================================== -->
    <!-- PAGE HEADER -->
    <!-- ========================================== -->

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h2 class="fw-bold mb-1">
                <i class="fa-solid fa-circle-plus text-success me-2"></i>
                Create Course Offering
            </h2>

            <nav aria-label="breadcrumb">

                <ol class="breadcrumb">

                    <li class="breadcrumb-item">
                        <a href="../dashboard/index.html">Dashboard</a>
                    </li>

                    <li class="breadcrumb-item">
                        <a href="courses.html">Courses</a>
                    </li>

                    <li class="breadcrumb-item">
                        <a href="course-offerings.html">Course Offerings</a>
                    </li>

                    <li class="breadcrumb-item active">
                        New Offering
                    </li>

                </ol>

            </nav>

        </div>

        <a href="course-offerings.html"
           class="btn btn-outline-secondary">

            <i class="fa-solid fa-arrow-left me-2"></i>
            Back to Offerings

        </a>

    </div>

    <!-- ========================================== -->
    <!-- COURSE OFFERING FORM -->
    <!-- ========================================== -->

    <div class="card border-0 shadow-sm">

        <div class="card-header bg-white">

            <h5 class="mb-0">

                <i class="fa-solid fa-book-open me-2"></i>
                Course Offering Information

            </h5>

        </div>

        <div class="card-body">

            <form>

                <div class="row">

                    <!-- Course -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label fw-semibold">
                            Course *
                        </label>

                        <select class="form-select">

                            <option selected disabled>
                                Select Course
                            </option>

                            <option>
                                CS101 - Introduction to Programming
                            </option>

                            <option>
                                CS201 - Data Structures
                            </option>

                            <option>
                                CS301 - Database Systems
                            </option>

                            <option>
                                MATH201 - Calculus II
                            </option>

                        </select>

                    </div>

                    <!-- Semester -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label fw-semibold">
                            Semester *
                        </label>

                        <select class="form-select">

                            <option selected disabled>
                                Select Semester
                            </option>

                            <option>
                                Spring 2026
                            </option>

                            <option>
                                Summer 2026
                            </option>

                            <option>
                                Fall 2026
                            </option>

                        </select>

                    </div>

                    <!-- Academic Year -->

                    <div class="col-md-4 mb-3">

                        <label class="form-label fw-semibold">
                            Academic Year *
                        </label>

                        <input type="number"
                               class="form-control"
                               placeholder="2026">

                    </div>

                    <!-- Instructor -->

                    <div class="col-md-4 mb-3">

                        <label class="form-label fw-semibold">
                            Instructor *
                        </label>

                        <select class="form-select">

                            <option selected disabled>
                                Select Instructor
                            </option>

                            <option>
                                Dr. Sarah Johnson
                            </option>

                            <option>
                                Prof. Michael Chen
                            </option>

                            <option>
                                Dr. Emily Davis
                            </option>

                        </select>

                    </div>

                    <!-- Classroom -->

                    <div class="col-md-4 mb-3">

                        <label class="form-label fw-semibold">
                            Classroom *
                        </label>

                        <select class="form-select">

                            <option selected disabled>
                                Select Classroom
                            </option>

                            <option>
                                Room A201
                            </option>

                            <option>
                                Room A202
                            </option>

                            <option>
                                Lab B105
                            </option>

                            <option>
                                Hall C001
                            </option>

                        </select>

                    </div>

                    <!-- Capacity -->

                    <div class="col-md-4 mb-3">

                        <label class="form-label fw-semibold">
                            Maximum Capacity
                        </label>

                        <input type="number"
                               class="form-control"
                               placeholder="50">

                    </div>

                    <!-- Start Date -->

                    <div class="col-md-4 mb-3">

                        <label class="form-label fw-semibold">
                            Start Date
                        </label>

                        <input type="date"
                               class="form-control">

                    </div>

                    <!-- End Date -->

                    <div class="col-md-4 mb-3">

                        <label class="form-label fw-semibold">
                            End Date
                        </label>

                        <input type="date"
                               class="form-control">

                    </div>

                    <!-- Status -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label fw-semibold">
                            Status
                        </label>

                        <select class="form-select">

                            <option selected>
                                Active
                            </option>

                            <option>
                                Draft
                            </option>

                            <option>
                                Closed
                            </option>

                        </select>

                    </div>

                    <!-- Section -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label fw-semibold">
                            Section
                        </label>

                        <input type="text"
                               class="form-control"
                               placeholder="Section A">

                    </div>

                    <!-- Notes -->

                    <div class="col-12 mb-3">

                        <label class="form-label fw-semibold">
                            Notes
                        </label>

                        <textarea rows="4"
                                  class="form-control"
                                  placeholder="Additional information regarding this offering..."></textarea>

                    </div>

                </div>

                <hr>

                <div class="d-flex justify-content-end gap-2">

                    <a href="course-offerings.html"
                       class="btn btn-secondary">

                        Cancel

                    </a>

                    <button type="reset"
                            class="btn btn-warning">

                        Reset

                    </button>

                    <button type="submit"
                            class="btn btn-success">

                        <i class="fa-solid fa-floppy-disk me-2"></i>
                        Save Course Offering

                    </button>

                </div>

            </form>

        </div>

    </div>

    <!-- ========================================== -->
    <!-- NEXT STEPS CARD -->
    <!-- ========================================== -->

    <div class="card border-0 shadow-sm mt-4">

        <div class="card-header bg-white">

            <h5 class="mb-0">

                <i class="fa-solid fa-road me-2"></i>
                After Creating an Offering

            </h5>

        </div>

        <div class="card-body">

            <div class="row">

                <div class="col-md-3 mb-2">

                    <a href="assign-instructor.html"
                       class="btn btn-outline-primary w-100">

                        Assign Instructor

                    </a>

                </div>

                <div class="col-md-3 mb-2">

                    <a href="assign-students.html"
                       class="btn btn-outline-success w-100">

                        Assign Students

                    </a>

                </div>

                <div class="col-md-3 mb-2">

                    <a href="course-schedule.html"
                       class="btn btn-outline-warning w-100">

                        Create Schedule

                    </a>

                </div>

                <div class="col-md-3 mb-2">

                    <a href="../attendance/attendance-sessions.html"
                       class="btn btn-outline-danger w-100">

                        Attendance Sessions

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Include Footer -->
<!-- ../../components/footer.html -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
