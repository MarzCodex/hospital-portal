<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lock Screen | Student Management System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../../assets/css/auth-theme.css">
<style>

        body {
            background: linear-gradient(to right, var(--accent-blue), var(--sidebar-active));
            min-height: 100vh;
            font-family: var(--font-stack);
        }

        .lock-card {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            color: white;
        }

        .lock-avatar {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border: 5px solid rgba(255,255,255,0.3);
        }

    </style>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>

<body>

    <div class="container">

        <div class="row justify-content-center align-items-center min-vh-100">

            <div class="col-md-5 col-lg-4">

                <div class="card border-0 shadow-lg lock-card">

                    <div class="card-body p-5 text-center">

                        <!-- User Image -->
                        <img src="../images/default-user.png"
                            alt="User"
                            class="rounded-circle lock-avatar mb-4">

                        <!-- User Name -->
                        <h3 class="fw-bold mb-1">
                            John Doe
                        </h3>

                        <p class="text-light opacity-75 mb-4">
                            Session Locked
                        </p>

                        <!-- Password Form -->
                        <form>

                            <div class="mb-4">

                                <div class="input-group input-group-lg">

                                    <span class="input-group-text bg-white border-0">
                                        <i class="fa-solid fa-lock text-primary"></i>
                                    </span>

                                    <input type="password"
                                        class="form-control border-0"
                                        placeholder="Enter Password">

                                </div>

                            </div>

                            <!-- Unlock Button -->
                            <div class="d-grid mb-3">

                                <button class="btn btn-light btn-lg fw-semibold">

                                    <i class="fa-solid fa-lock-open me-2"></i>

                                    Unlock Session

                                </button>

                            </div>

                            <!-- Switch Account -->
                            <a href="login.html"
                                class="btn btn-outline-light btn-lg w-100">

                                <i class="fa-solid fa-right-from-bracket me-2"></i>

                                Switch Account

                            </a>

                        </form>

                        <!-- Footer -->
                        <div class="mt-4">

                            <small class="text-light opacity-75">
                                Your session was locked for security reasons.
                            </small>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
