<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Forgot Password | Student Management System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../assets/css/auth-theme.css">
<style>

        body{
            min-height: 100vh;
            background: linear-gradient(135deg, var(--sidebar-bg), var(--accent-blue));
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
            font-family: var(--font-stack);
        }

        /* Background Shapes */
        .bg-shape{
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
            z-index: 0;
        }

        .shape-1{
            width: 300px;
            height: 300px;
            background: #ffffff;
            top: -80px;
            left: -80px;
        }

        .shape-2{
            width: 250px;
            height: 250px;
            background: #60a5fa;
            bottom: -80px;
            right: -80px;
        }

        /* Card */
        .forgot-card{
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        /* Logo */
        .logo-box{
            width: 90px;
            height: 90px;
            border-radius: 24px;
            background: linear-gradient(135deg, var(--accent-blue), var(--sidebar-active));
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: auto;
            margin-bottom: 25px;
        }

        /* Form */
        .form-control{
            height: 55px;
            border-radius: 14px;
            padding-left: 45px;
            border: 1px solid #cbd5e1;
        }

        .form-control:focus{
            border-color: #2563eb;
            box-shadow: none;
        }

        .input-group-text{
            position: absolute;
            z-index: 10;
            height: 55px;
            border: none;
            background: transparent;
            color: #64748b;
            padding-left: 15px;
        }

        /* Button */
        .btn-reset{
            height: 55px;
            border-radius: 14px;
            background: var(--accent-blue);
            border: none;
            color: white;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-reset:hover{
            transform: translateY(-2px);
            filter: brightness(0.95);
        }

        /* Info Box */
        .info-box{
            background: #eff6ff;
            border-radius: 14px;
            padding: 18px;
        }

        /* Back Link */
        .back-link{
            text-decoration: none;
            font-weight: 600;
            color: #2563eb;
        }

        .back-link:hover{
            color: #1e40af;
        }

        /* Responsive */
        @media(max-width: 576px){

            .forgot-card{
                padding: 30px 20px;
            }

        }

    </style>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>

    <!-- Background Shapes -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <!-- Forgot Password Card -->
    <div class="forgot-card">

        <!-- Logo -->
        <div class="text-center">

            <div class="logo-box">

                <i class="fa fa-lock"></i>

            </div>

            <h2 class="fw-bold mb-2">
                Forgot Password?
            </h2>

            <p class="text-muted mb-4">
                Enter your email address and we will send
                you instructions to reset your password.
            </p>

        </div>

        <!-- Information Box -->
        <div class="info-box mb-4">

            <div class="d-flex">

                <div class="me-3 text-primary">

                    <i class="fa fa-circle-info fa-lg"></i>

                </div>

                <div>

                    <h6 class="fw-bold mb-1">
                        Password Recovery
                    </h6>

                    <small class="text-muted">
                        A reset link will be sent to your
                        registered email account.
                    </small>

                </div>

            </div>

        </div>

        <!-- Form -->
        <form>

            <div class="mb-4 position-relative">

                <span class="input-group-text">

                    <i class="fa fa-envelope"></i>

                </span>

                <input type="email"
                       class="form-control"
                       placeholder="Enter your email address">

            </div>

            <button type="submit"
                    class="btn btn-primary btn-reset w-100 mb-4">

                <i class="fa fa-paper-plane me-2"></i>
                Send Reset Link

            </button>

        </form>

        <!-- Extra Links -->
        <div class="text-center">

            <p class="text-muted mb-2">
                Remember your password?
            </p>

            <a href="login.html"
               class="back-link">

                <i class="fa fa-arrow-left me-2"></i>
                Back to Login

            </a>

        </div>

        <!-- Divider -->
        <hr class="my-4">

        <!-- Support -->
        <div class="text-center">

            <small class="text-muted">

                Need help?
                Contact system administrator or support team.

            </small>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
