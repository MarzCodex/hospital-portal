<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email | Student Management System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../../assets/css/auth-theme.css">
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>

<body class="auth-bg">

    <div class="container">

        <div class="row justify-content-center align-items-center min-vh-100">

            <div class="col-md-6 col-lg-5">

                <div class="card border-0 shadow-lg rounded-4">

                    <div class="card-body p-5 text-center">

                        <!-- Icon -->
                        <div class="mb-4">
                            <div class="bg-primary bg-opacity-10 rounded-circle d-inline-flex align-items-center justify-content-center"
                                style="width: 100px; height: 100px;">

                                <i class="fa-solid fa-envelope-circle-check fa-3x text-primary"></i>

                            </div>
                        </div>

                        <!-- Title -->
                        <h2 class="fw-bold mb-3">
                            Verify Your Email
                        </h2>

                        <!-- Description -->
                        <p class="text-muted mb-4">
                            We've sent a verification link to your email address.
                            Please check your inbox and click the verification link
                            to activate your account.
                        </p>

                        <!-- Email Box -->
                        <div class="alert alert-info border-0 shadow-sm">

                            <i class="fa-solid fa-envelope me-2"></i>

                            student@example.com

                        </div>

                        <!-- Buttons -->
                        <div class="d-grid gap-3 mt-4">

                            <button class="btn btn-primary btn-lg">
                                <i class="fa-solid fa-paper-plane me-2"></i>
                                Resend Verification Email
                            </button>

                            <a href="login.html" class="btn btn-outline-secondary btn-lg">
                                <i class="fa-solid fa-arrow-left me-2"></i>
                                Back to Login
                            </a>

                        </div>

                        <!-- Footer -->
                        <div class="mt-4">

                            <small class="text-muted">
                                Didn't receive the email?
                                Check your spam folder or request another verification email.
                            </small>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
