<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>403 - Access Denied | Student Management System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>

body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    font-family:Arial,sans-serif;
}

.error-container{
    max-width:700px;
    width:100%;
}

.error-card{
    background:white;
    border:none;
    border-radius:25px;
    padding:50px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,.25);
}

.error-icon{
    width:140px;
    height:140px;
    margin:auto;
    border-radius:50%;
    background:#fef2f2;
    display:flex;
    align-items:center;
    justify-content:center;
}

.error-icon i{
    font-size:70px;
    color:#dc2626;
}

.error-code{
    font-size:100px;
    font-weight:800;
    color:#dc2626;
    line-height:1;
}

.action-btn{
    min-width:180px;
}

.security-box{
    background:#f8fafc;
    border-radius:15px;
    padding:20px;
}

</style>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>

<div class="container">

    <div class="error-container">

        <div class="error-card">

            <!-- ICON -->

            <div class="error-icon mb-4">

                <i class="fa-solid fa-lock"></i>

            </div>

            <!-- ERROR CODE -->

            <div class="error-code">
                403
            </div>

            <h2 class="fw-bold mt-3">
                Access Denied
            </h2>

            <p class="text-muted mb-4">

                You do not have permission to access this resource.
                Please contact your administrator if you believe this is an error.

            </p>

            <!-- SECURITY MESSAGE -->

            <div class="security-box mb-4">

                <div class="row text-start">

                    <div class="col-md-6 mb-3">

                        <i class="fa fa-user-shield text-danger me-2"></i>
                        Permission Required

                    </div>

                    <div class="col-md-6 mb-3">

                        <i class="fa fa-lock text-danger me-2"></i>
                        Restricted Content

                    </div>

                    <div class="col-md-6">

                        <i class="fa fa-shield-halved text-danger me-2"></i>
                        Security Protected

                    </div>

                    <div class="col-md-6">

                        <i class="fa fa-eye-slash text-danger me-2"></i>
                        Unauthorized Access

                    </div>

                </div>

            </div>

            <!-- ACTIONS -->

            <div class="d-flex flex-wrap justify-content-center gap-3">

                <a href="../dashboard/index.html"
                   class="btn btn-primary action-btn">

                    <i class="fa fa-house me-2"></i>
                    Dashboard

                </a>

                <a href="javascript:history.back()"
                   class="btn btn-outline-secondary action-btn">

                    <i class="fa fa-arrow-left me-2"></i>
                    Go Back

                </a>

            </div>

            <!-- FOOTER -->

            <div class="mt-5 text-muted">

                <small>

                    Error Code: 403 Forbidden |
                    Student Management System

                </small>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
