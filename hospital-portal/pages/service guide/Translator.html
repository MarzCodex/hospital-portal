<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../assets/css/common.css">
    <link rel="stylesheet" href="../../assets/css/translator-styles.css">
    <title>Hospital Service Portal | Services Guide</title>
</head>
<body>
    <!-- Sidebar Container -->
    <div id="sidebar-container"></div>
    
    <!-- Main Content Wrapper -->
    <div class="main-content" id="mainContent">
        <!-- Header Container -->
        <div id="header-container"></div>
        
        <!-- Page Content -->
        <div id="page-content">
            <div class="page-container">
                <div class="page-header">
                    <h2><i class="fas fa-calendar-alt"></i> Services Guide</h2>
                </div>
                
                <div class="translator-container">
                    <!-- Tabs Section -->
                    <div class="tabs-section">
                        <button class="tab-btn active" data-tab="price">
                            <i class="fas fa-tablets"></i> Price List
                        </button>
                        <button class="tab-btn" data-tab="visits">
                            <i class="fas fa-hospital-user"></i> Visit Types
                        </button>
                        <button class="refresh-btn" id="refresh-data" title="Refresh current data">
                            <i class="fas fa-sync-alt"></i> Refresh
                        </button>
                    </div>
                    
                    <!-- File Info Display -->
                    <div class="file-info" id="file-info" style="display: none;">
                        <div class="file-info-item"><strong>📄 File:</strong> <span id="file-name"></span></div>
                        <div class="file-info-item"><strong>📊 Size:</strong> <span id="file-size"></span></div>
                        <div class="file-info-item"><strong>🔢 Items:</strong> <span id="item-count"></span></div>
                        <div class="file-info-item"><strong>⏰ Loaded:</strong> <span id="load-time"></span></div>
                    </div>
                    
                    <!-- Controls Section -->
                    <div class="controls" id="controls" style="display: none;">
                        <div class="search-box">
                            <input type="text" id="search-input" placeholder="Search across all fields...">
                        </div>
                        <div class="filter-box">
                            <span class="page-size-label">Show:</span>
                            <select id="pageSize">
                                <option value="20">20</option>
                                <option value="50">50</option>
                                <option value="100">100</option>
                                <option value="300">300</option>
                                <option value="ALL">All Items</option>
                            </select>
                            <select id="column-filter">
                                <option value="">Filter by Column</option>
                            </select>
                            <input type="text" id="filter-value" placeholder="Filter value..." style="display: none;">
                            <select id="scheme-value" style="display: none; min-width: 200px;">
                                <option value="">Select Benefit Scheme...</option>
                            </select>
                        </div>
                        <div class="action-buttons">
                            <button id="reset-filters" class="secondary">
                                <i class="fas fa-undo-alt"></i> Reset Filters
                            </button>
                            <button id="export-pdf" class="success">
                                <i class="fa-solid fa-download"></i> Export
                            </button>
                        </div>
                    </div>
                    
                    <!-- Stats Section -->
                    <div class="stats-info" id="stats-info" style="display: none;">
                        <span id="filter-stats"></span> | 
                        <span id="restricted-count"></span> | 
                        <span id="price-range"></span>
                    </div>
                    
                    <!-- Table Container -->
                    <div id="table-container">
                        <div class="loading-overlay" id="loading-overlay" style="display: none;">
                            <div class="spinner"></div>
                            <p>Processing data...</p>
                        </div>
                        
                        <div class="empty-state" id="empty-state">
                            <div class="empty-state-icon">📊</div>
                            <h3>No Data Loaded</h3>
                            <p>Click a tab above to load data</p>
                        </div>
                        
                        <table id="items-table" style="display: none;">
                            <thead id="table-header"></thead>
                            <tbody id="table-body"></tbody>
                         </table>
                    </div>
                    
                    <!-- Popup Details Modal -->
                    <div id="more-details">
                        <div>
                            <div class="popup-header">
                                <h3>More Details</h3>
                                <button class="popup-close" title="Close">✕</button>
                            </div>
                            <div class="popup-content">
                                <table id="popup_table">
                                    <thead id="pop-header"></thead>
                                    <tbody id="pop-body"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Export Modal -->
                    <div id="export-modal" class="export-modal">
                        <div class="export-modal-content">
                            <div class="export-modal-header">
                                <h3>Save As</h3>
                                <button class="export-close" id="export-close-btn" style="min-width: 30px;"><i class="fas fa-times"></i></button>
                            </div>
                            <div class="export-modal-body">
                                <div class="export-option" id="export-pdf-option">
                                    <div class="export-option-icon">📄</div>
                                    <div class="export-option-text">
                                        <div class="export-option-title">Export as PDF</div>
                                    </div>
                                    <div class="export-option-arrow">→</div>
                                </div>
                                <div class="export-option" id="export-json-option">
                                    <div class="export-option-icon">📝</div>
                                    <div class="export-option-text">
                                        <div class="export-option-title">Export as Text</div>
                                    </div>
                                    <div class="export-option-arrow">→</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Pagination -->
                    <div class="pagination" id="pagination" style="display: none;"></div>
                    
                    <!-- Notification -->
                    <div id="notification" class="notification"></div>
                </div>
            </div>
        </div>
        
        <!-- Footer Container -->
        <div id="footer-container"></div>
    </div>
    
    <!-- Modals Container -->
    <div id="modals-container"></div>

    <!-- Scripts -->
    <script src="../../assets/js/common.js"></script>
    <script src="../../assets/js/translator.js"></script>
    
   <script>
    // ========================================
    // COMPONENT LOADING
    // ========================================
    
    async function loadComponents() {
        try {
            // Load sidebar
            const sidebarRes = await fetch('../../components/sidebar.html');
            if (sidebarRes.ok) {
                document.getElementById('sidebar-container').innerHTML = await sidebarRes.text();
            }
            
            // Load header
            const headerRes = await fetch('../../components/header.html');
            if (headerRes.ok) {
                document.getElementById('header-container').innerHTML = await headerRes.text();
            }
            
            // Load footer
            const footerRes = await fetch('../../components/footer.html');
            if (footerRes.ok) {
                document.getElementById('footer-container').innerHTML = await footerRes.text();
            }
            
            // Load modals
            const modalsRes = await fetch('../../components/modals.html');
            if (modalsRes.ok) {
                document.getElementById('modals-container').innerHTML = await modalsRes.text();
            }
            
            // Initialize after components loaded
            initPageComponents();
            
        } catch (error) {
            console.error('Error loading components:', error);
        }
    }
    
    function initPageComponents() {
        // Initialize user dropdown
        if (typeof initUserDropdown === 'function') {
            initUserDropdown();
        }
        
        // Set user info from sessionStorage
        const userName = sessionStorage.getItem('userName') || 'Phillip Z.P';
        const jobTitle = sessionStorage.getItem('jobTitle') || 'System Administrator';
        
        const userNameSpan = document.getElementById('userName');
        const jobTitleSpan = document.getElementById('jobTitle');
        const userAvatar = document.getElementById('userAvatar');
        
        if (jobTitleSpan) jobTitleSpan.textContent = jobTitle + ' |';
        if (userNameSpan) userNameSpan.textContent = userName;
        if (userAvatar) {
            const initials = userName.split(' ').map(n => n[0]).join('');
            userAvatar.textContent = initials;
        }
        
        // Sidebar toggle (hamburger menu)
        const menuToggle = document.getElementById('menuToggle');
        if (menuToggle) {
            menuToggle.addEventListener('click', function(e) {
                e.stopPropagation();
                toggleSidebar();
            });
        }

        // Close sidebar button (X button)
        const closeSidebarBtn = document.getElementById('closeSidebarBtn');
        if (closeSidebarBtn) {
            closeSidebarBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                closeSidebar();
            });
        }

        // Initialize sidebar state
        initSidebarState();

        // Handle window resize
        window.addEventListener('resize', function() {
            handleResponsiveSidebar();
        });
    }
    
    document.addEventListener('DOMContentLoaded', loadComponents);
</script>
</body>
</html>
